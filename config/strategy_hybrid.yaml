# 하이브리드 전략 (권장)
# 공격적 + 보수적 + 부분청산의 장점 결합

trailing:
  activation_pct: 1.5        # 문서 명세: 트레일링 활성화 +1.5%
  ratio: 1.0                 # 문서 명세: 트레일링 비율 -1.0%
  stop_loss_pct: 3.0         # 문서 명세: 기본 손절 -3.0%

  use_profit_tier: true      # 큰 수익 시 강화 ✅
  profit_tier_threshold: 6.0 # 🔧 FIX: +6% 도달 시 (문서 명세 반영)
  profit_tier_ratio: 0.5     # 0.5%로 강화

  use_atr_based: true        # 🔧 FIX: ATR 기반 트레일링 활성화 (문서 명세)
  atr_multiplier: 1.3        # ✅ ChatGPT 리뷰: ATR×1.3 (1.5→1.3, 코스닥 변동성 고려)

  # 🔧 NEW: 당일 매수 종목 강화 손절 (2026-01-20 제이엔비 분석 반영)
  # 당일 매수 종목은 더 타이트한 손절 적용 (장기 하락 노출 방지)
  same_day_entry:
    enabled: true              # 당일 매수 종목 강화 손절 활성화
    stop_loss_pct: 1.5         # 당일 매수: -1.5% 손절 (기본 3.0% → 1.5%)
    trailing_ratio: 0.8        # 당일 매수: 트레일링 0.8% (기본 1.0% → 0.8%)

filters:
  use_trend_filter: true
  trend_period: 20

  # 📊 ML 개선 (2025-12-15): L1 거래량 필터 강화
  # 이번주 분석: 조기 손절 5건 빈발 → 진입 품질 개선 필요
  use_volume_filter: true
  volume_multiplier: 1.5     # 1.2 → 1.5 (거래량 기준 상향)

  use_breakout_confirm: false
  breakout_confirm_candles: 2

  use_volume_value_filter: false
  min_volume_value: 1000000000

  use_market_momentum: false

  use_daily_trend_filter: true

  # 📊 ML 개선 (2025-12-15): L2 변동성 필터 강화
  # 이번주 분석: 조기 손절 5건 빈발 → 변동성 기준 강화
  use_volatility_filter: true   # 위험 종목 제외 ✅
  min_atr_pct: 0.8             # 0.5 → 0.8 (너무 낮은 변동성 제외)
  max_atr_pct: 4.0             # 4.5 → 4.0 (너무 위험한 종목 제외)

time_filter:
  use_time_filter: true        # 🔧 FIX: 장 초반/마감 회피 활성화 (문서 명세)
  market_open: "09:00"
  market_close: "15:20"
  avoid_early_minutes: 30      # 🔧 FIX: 09:30까지 회피 (문서 명세) [복원: 10→30]
  avoid_late_minutes: 21       # 🔧 FIX: 14:59까지만 진입 (15:20-21=14:59) [복원: 10→21]

  # 📊 시뮬레이션 결과 반영 (2026-01-17): 오전장이 가장 효과적
  # 8일 시뮬레이션: 승률 50.7%, 총 수익 +19,840원
  time_weight:
    morning_bonus: 1.5         # 09:30~12:00 신호 가중치 50% 증가 (시뮬레이션 최적 구간)
    # 📊 시뮬레이션 결과: 오후장 진입 시 손실 증가 → squeeze_2tf는 12시 이전만
    midday_penalty: 0.0        # 12:00~14:00 신호 완전 차단
    afternoon_penalty: 0.0     # 14:00~14:59 신호 완전 차단 (squeeze_2tf 기준)

re_entry:
  use_cooldown: true           # 재진입 방지 ✅
  cooldown_minutes: 20         # 적절한 대기 시간 (fallback)

  # 🔧 2026-02-07: 쿨다운 차등화 v2 (exit_reason 기반)
  # Early Failure/손절 → 강한 쿨다운, 익절 → 쿨다운 없음
  reentry_cooldown:
    enabled: true
    by_exit_reason:
      # 🔧 2026-02-08: EF subtype별 차등 쿨다운
      ef_no_follow: 20           # 구조 살아있음, 타이밍만 실패 → 짧은 대기
      ef_no_demand: 45           # 수급 부재, 가짜 신호 → 긴 대기
      early_failure: 60          # 미분류 EF fallback → 가장 위험, 60분
      hard_stop: 60              # Hard Stop → 이상 이벤트, 60분
      stop_loss: 45              # 명확한 손절 → 45분
      trailing_stop: 30          # 트레일링 스탑 → 30분
      time_exit: 20              # 시간 기반 청산 → 짧게 20분
      take_profit: 0             # 익절 → 차단하지 않음
      partial_exit: 10           # 부분 청산 → 짧게 10분
      default: 30                # 분류 불가 → 안전 fallback 30분

    # 🔧 2026-02-07: 쿨다운 Override (강한 신호가 쿨다운 bypass)
    override_rules:
      enabled: true
      blocked_reasons:             # 이 카테고리는 절대 override 불가
        - early_failure            # 미분류 EF
        - ef_no_demand             # 수급 부재 → 절대 불가
        - hard_stop                # Hard Stop → 이상 이벤트, override 불가
        # ef_no_follow는 override 허용 (구조 살아있으므로)
      squeeze_override:
        enabled: true
        bb_width_percentile_max: 15   # BB width percentile ≤ 15 (극심한 수축)
        volume_mult_min: 2.5          # 거래량 ≥ 20일 평균의 2.5배
        require_squeeze_on: true      # Squeeze ON 상태 필수
      momentum_override:
        enabled: true
        roc3_min_pct: 2.5             # ROC(3) ≥ 2.5% (강한 단기 모멘텀)
        rsi14_min: 65                 # RSI(14) ≥ 65 (상승 모멘텀)
        require_above_vwap: true      # VWAP 위 필수

      # 🔧 2026-02-08 R2: Override 남용 방지
      override_abuse_guard:
        enabled: true
        max_override_ratio_pct: 30    # override / ef_no_follow 차단 비율 상한 (30%)
        min_samples: 3                # 최소 차단 횟수 (이하면 비율 판단 안 함)
        action: "disable_today"       # disable_today | warn_only

      # 🔧 2026-02-08: 종가 전용 Override (14:30~15:20)
      # ❗ T3 실매매 로그 검증 전까지 OFF
      close_override:
        enabled: false                    # ← T3 통과 전까지 OFF
        time_start: "14:30"               # 종가 구간 시작
        time_end: "15:20"                 # 종가 구간 종료
        require_above_vwap: true          # close > VWAP 필수
        require_above_ema20: true         # close > EMA20 필수
        volume_ratio_min: 1.5             # 최근 5봉 avg / 20봉 avg ≥ 1.5
        volume_lookback: 5                # 최근 거래량 평균 봉 수
        # 종가 진입 시 필터 조정 (main에서 참조)
        entry_filter_overrides:
          min_choch_grade: "B"            # CHoCH 등급 완화 (평소 A → B)
          min_hold_minutes: 10            # 최소 보유 시간 축소 (평소 20~30)
          disable_ef_check: true          # 종가 진입에는 EF 관찰 비활성화
          stop_atr_multiplier: 0.5        # 손절 ATR 배수 축소 (평소 0.7)

    # 🔧 2026-02-10: Market Sensor (EF 기반 시장 상태 판별 → 진입 차단)
    # EF를 손절 도구 → 시장 판별 센서로 격상
    # 규칙 ①: 오전 EF N회 → 오후 진입 중단
    # 규칙 ②: no_follow N회 누적 → Risk OFF Day
    market_sensor:
      enabled: true
      morning_ef_limit: 2              # 오전 EF 2회 → 오후 진입 차단
      morning_cutoff: "12:00"          # 오전/오후 구분 시각
      risk_off_no_follow_limit: 3      # no_follow 3회 누적 → Risk OFF Day (신규 진입 전면 중단)

risk_management:
  initial_capital: 10000000
  daily_target_profit_pct: 2.0 # 🎯 일일 목표 수익 2% (약 7,500원)
  daily_max_loss_pct: 2.0      # 일일 손실 2%
  max_drawdown_pct: 10.0
  max_trades_per_day: 15       # 📊 DATA: 거래 데이터 기반 (10→15)
  max_consecutive_losses: 3

  # 🔧 Phase 3: 연속 손실 대응 정책
  on_consecutive_loss_action: "halt_day"  # "halt_day" (당일 중지) or "reduce_size" (포지션 축소)
  loss_size_reduction: 0.5                # reduce_size 선택 시 포지션 크기 축소 비율 (50%)
  max_positions: 3             # 🔧 CRITICAL FIX: 동시 보유 최대 3개 (누락 항목 추가)
  position_risk_pct: 1.0       # 포지션당 리스크 1%
  min_rr_ratio: 1.5

  # 🔧 REFACTOR: RiskManager 추가 설정 (2026-01-17 시뮬레이션 반영)
  # 시뮬레이션 결과: 8일간 승률 50.7%, 총 수익 +19,840원 (8만원 기준)
  min_cash_reserve_pct: 10     # 최소 현금 보유 비율 10% (20→10, 적극적)
  max_position_size_pct: 40    # 포지션당 최대 40% (30→40, 적극적)
  hard_max_position: 500000    # 하드 포지션 제한 50만원 (30만→50만, 적극적)

risk_control:
  max_daily_loss_pct: 3.0      # SignalOrchestrator L0 필터용 (일일 손실 한도)
  max_weekly_loss_pct: 5.0     # 🔧 REFACTOR: 주간 손실 한도 5%
  hard_stop_pct: 2.0           # 📊 ML 개선 (2025-12-16): -2.5% → -2.0% (실제 손실 -2.61%, -3.09% 방지)
  technical_stop_pct: 1.5      # 기술적 손절선 -1.5%

  # 초기 실패 컷 (손익비 개선의 핵심)
  early_failure:
    enabled: true              # 활성화
    window_minutes: 30         # 📊 ML: 30분으로 연장 (초단타 방지, 평균 승리 보유 124분)
    loss_cut_pct: -1.6         # 📊 DATA: 실제 평균 손실 -2.03%의 80% = -1.6%

  # 🔧 Phase 3: 최소 보유 시간 강제 (초단타 방지)
  min_hold_time:
    enabled: true              # 최소 보유 시간 강제 활성화
    minutes: 30                # 📊 DATA: 패배 평균 9분 vs 승리 평균 124분 → 30분 권장

  # 🔧 2026-02-06: 구조 기반 손절 (SMC 전략)
  # 고정 퍼센트 손절 → 구조 저점/HL - ATR 버퍼
  # 포지션 크기 = (계좌 × 2%) / (진입가 - 구조손절가)
  structure_based_stop:
    enabled: true                      # 구조 기반 손절 활성화
    atr_buffer_mult: 0.5               # 구조점 아래 ATR × 0.5 버퍼
    max_stop_pct: 3.0                  # 최대 손절 폭 cap (3%)

  # 🔧 2026-02-06: 조건부 최소 보유 시간 연장
  # HTF 추세 일치 + ATR 확장 + 거래량 평균 이상 중 2개 충족 시 보유 시간 연장
  conditional_hold:
    enabled: true                      # 조건부 보유 활성화
    min_conditions: 2                  # 최소 충족 조건 수
    hold_multiplier: 1.5               # 조건 충족 시 보유시간 배수 (1.5x)

  # 🔧 2026-02-07: Early Failure Structure Filter (빠른 구조 실패 감지)
  # 진입 후 2~3캔들(5~15분) 이내 실패 신호 감지 → 조기 탈출
  # Score: direction_fail(2) + atr_decay(1) + volume_dry(1) >= 3
  early_failure_structure:
    enabled: true                      # Early Failure 구조 필터 활성화
    min_observe_minutes: 5             # 최소 관찰 시간 (분)
    observe_minutes: 15                # 최대 관찰 구간 (분)
    score_threshold: 3                 # 조기 청산 임계값
    atr_decay_ratio: 0.85             # ATR 감쇠 비율 (< 0.85 = 모멘텀 소실)
    volume_dry_ratio: 0.8             # 거래량 고갈 비율 (< 0.8 = 고갈)
    mfe_ratio: 0.25                   # MFE 실패 비율 (MFE < ATR × 0.25 = 방향성 부족)
    follow_through_candles: 3          # 추종 실패 캔들 수 (N캔들 종가 모두 진입가 반대)
    action: "exit_market"              # exit_market | reduce_half | trail_stop

  # 🔧 2026-01-27: 오버나잇 전용 Exit 로직 (아진엑스텍 사례 반영)
  # 전일 진입분 ≠ 당일 진입분 - 시초가 변동성 보호
  overnight_exit:
    enabled: true                           # 오버나잇 Exit 로직 활성화
    morning_protection_start: "09:00:00"    # 보호 구간 시작
    morning_protection_end: "09:30:00"      # 보호 구간 종료
    use_open_range: true                    # Open Range (09:00~09:30) 기반 스탑 사용
    open_range_multiplier: 1.5              # OR Low - (OR Range × 1.5) 이탈 시 청산

  # 🔧 2026-02-16: Conservative Mode (Hard Stop 발동 시 자동 보수 전환)
  # Hard Stop은 오버나이트 강제 청산 이후 이상 이벤트 — 발생 시 노출도 자동 축소
  conservative_mode:
    enabled: true
    max_positions: 1              # 동시 보유 3 → 1로 축소
    position_size_mult: 0.5       # 포지션 사이즈 50% 축소
    cooldown_mult: 1.5            # 쿨다운 시간 1.5배 연장

  # 🔧 2026-01-27: 무승부(Draw) 거래 정의
  # +0.2% 미만 & 6시간+ 보유 = WIN/LOSS가 아닌 DRAW로 분류
  draw_trade:
    enabled: true                           # Draw 분류 활성화
    profit_threshold_pct: 0.2               # +0.2% 미만은 Draw (수수료 고려)
    min_hold_hours: 6                       # 6시간 이상 보유 시 적용

partial_exit:
  enabled: false               # ❌ 비활성화: MA Cross 단순 전략 (부분 청산 없음)
  tiers:
    # 📊 ML 개선 (2025-12-15): 손익비 0.38 → 익절 타겟 상향
    # 이번주 분석: 평균 승리 +0.65% vs 평균 손실 -1.70% → 더 늦게, 더 적게 청산
    - profit_pct: 1.5          # +1.5%에 30% 청산 (기존 +0.7% 40% → 상향)
      exit_ratio: 0.3
    - profit_pct: 2.5          # +2.5%에 30% 청산 (기존 +1.1% 40% → 상향)
      exit_ratio: 0.3
    # 나머지 40%는 트레일링 스톱으로 추가 수익 추구 (기존 20% → 40%)

# ❌ 트레일링 스탑 비활성화 (MA Cross 단순 전략)
# trailing_stop:
#   activation_profit_pct: 2.5
#   distance_pct: 0.8
#   min_lock_profit_pct: 0.3

# ❌ VWAP 청산 비활성화 (MA Cross 단순 전략)
# vwap_exit:
#   profit_threshold_for_ignore: 2.0
#   multi_condition_required: true

# ========================================
# ✅ Squeeze Momentum 전략 설정 (LazyBear)
# ========================================
squeeze_momentum:
  enabled: true                      # 스퀴즈 모멘텀 활성화

  # 진입 조건 모드 선택
  # "squeeze_only"           : 스퀴즈 모멘텀만 사용 (기존 L0-L6 필터 무시)
  # "squeeze_with_orderbook" : 스퀴즈 + 호가창 통합 전략 (Phase 1 필터)
  # "legacy_only"            : 기존 필터만 사용 (스퀴즈 모멘텀 무시)
  # "hybrid"                 : 둘 다 사용 (기존 필터 + 스퀴즈 모멘텀)
  # "ma_cross"               : MA 골든크로스/데드크로스 전략 (5분봉 MA5/MA10)
  # "squeeze_2tf"            : 2-타임프레임 전략 (30분봉 MA5/MA20 + Squeeze + 하위봉 진입)
  # "smc"                    : SMC (Smart Money Concepts) - CHoCH + Liquidity Sweep
  # entry_mode: "ma_cross"  # 대기: 5분봉 MA 골든크로스 전략
  # entry_mode: "squeeze_2tf"  # 30분봉 + Squeeze + 5분봉 진입
  entry_mode: "smc"        # ✅ 현재: SMC 전략 (CHoCH + Liquidity Sweep)

  # 진입 필터
  entry_filter:
    enabled: true                    # 진입 시 스퀴즈 체크 활성화
    require_bright_green: true       # Bright Green (가속) 필수
    min_momentum: 0.0                # 최소 모멘텀 값

  # ✅ 호가창 필터 (Phase 1 보수적 필터)
  orderbook_filter:
    enabled: true                    # 호가창 필터 활성화

    # 진입 조건 (6개)
    entry_conditions:
      volume_surge_mult: 1.3         # 거래량 급증 (5분 vs 이전 5분)
      sell_decrease_ratio: 0.8       # 매도 1호가 감소 (1분 평균 대비)
      price_stable_max_sec: 5        # 가격 정체 최대 허용 (초)
      execution_strength_min: 90.0   # 최소 체결강도 (절대값)
      execution_strength_mult: 1.1   # 종목별 상대 체결강도 (20일 평균 대비)

    # 진입 금지 조건 (3개)
    entry_blockers:
      chase_prevention_pct: 2.0      # 급등 후 고점 대비 -2% 이상 하락 시 진입 금지
      sell_surge_ratio: 1.3          # 매도호가 급증 (+30% 이상) 시 금지
      weak_execution_min: 90.0       # 약한 체결강도 (<90%) 차단

    # 듀얼 손절 구조
    stop_loss:
      vwap_rapid_pct: 0.8            # 급락 손절: VWAP -0.8%
      vwap_trend_enabled: true       # 추세 손절 활성화
      trend_execution_min: 80.0      # 추세 손절: 5분 VWAP 이탈 + 체결강도 < 80%

    # 차등 쿨다운
    cooldown:
      crash_minutes: 30              # 급락 손절 (≥2% 손실) 쿨다운
      trend_minutes: 15              # 추세 붕괴 손절 쿨다운
      strategy_minutes: 0            # 전략 청산 쿨다운 (없음)

  # ❌ 청산 필터 비활성화 (MA Cross 단순 전략: 데드크로스만 사용)
  exit_filter:
    enabled: false                   # 청산 시 스퀴즈 체크 비활성화

    # Dark Green (감속) - 부분 익절 (휴림로봇 성공 사례)
    dark_green:
      enabled: false
      partial_exit_ratio: 0.3        # 30% 부분 익절
      min_profit_pct: 1.0            # 최소 수익률 1%

    # Red (반전) - 전량 청산
    red:
      enabled: false
      full_exit: true                # 전량 청산
      min_profit_pct: 0.5            # 최소 수익률 0.5%

    # Bright Green (가속) - 보유 필수 (아이티센글로벌 교훈)
    bright_green:
      force_hold: false              # 강제 보유 비활성화
      ignore_trailing_stop: false    # 트레일링 스탑은 유지 (과도한 손실 방지)

  # 지표 파라미터
  parameters:
    bb_length: 20                    # Bollinger Bands 기간
    bb_mult: 2.0                     # Bollinger Bands 배수
    kc_length: 20                    # Keltner Channel 기간
    kc_mult: 1.5                     # Keltner Channel 배수
    mom_length: 20                   # 모멘텀 계산 기간

  # 실전 통계 (docs/1231 분석 기반)
  stats:
    tested_stocks: ["휴림로봇", "모비스", "삼보모터스", "아이티센글로벌"]
    success_rate: 0.25               # 신호 일치율 25% (1/4)
    best_case: "휴림로봇"            # Dark Green 부분 익절 성공
    worst_case: "아이티센글로벌"     # Bright Green 조기 익절로 8배 수익 상실

# ❌ 시간 기반 청산 비활성화 (MA Cross 단순 전략: 데드크로스만 사용)
# time_based_exit:
#   loss_breakeven_exit_time: "15:00:00"
#   final_force_exit_time: "15:05:00"
#   loss_breakeven_threshold_pct: 0.0

# ========================================
# 🔧 2026-02-15: 오버나이트 강제 청산
# CHoCH A급만 익일 보유 허용, B급 이하 14:50 강제 청산
# ========================================
overnight_close:
  enabled: true
  check_time: "14:50:00"          # 체크 시각 (참고용, 코드는 14:50 하드코딩)
  exempt_grades:                   # 오버나이트 허용 등급
    - A
  use_market_order: true           # 시장가 청산 (빠른 체결)

# ========================================
# ✅ ChatGPT 리뷰 반영: EOD 정책 추가
# ========================================
eod_policy:
  enabled: false                         # ❌ 비활성화: 시간 기반 강제 청산 없음
  check_time: "14:55:00"                 # ✅ 수정: 14:55 (15:00에서 변경, API 지연 고려)
  force_exit_time: "15:05:00"            # ✅ 수정: 15:05 (15:10에서 변경)
  max_overnight_positions: 3             # 최대 익일 보유 종목 수
  min_overnight_score: 0.6               # 최소 보유 점수 (0.0-1.0)
  max_overnight_position_value_pct: 40  # ✅ 추가: 계좌 자산의 40%까지만 익일 보유

  # 익일 보유 기준
  overnight_criteria:
    trend_weight: 0.4                    # 추세 가중치
    volume_weight: 0.3                   # 거래량 가중치
    news_weight: 0.3                     # 뉴스/재료 가중치

    min_ema_state: true                  # EMA5 > EMA20 필수
    min_vol_z20: 1.0                     # 최소 거래량 Z-score
    min_news_score: 50                   # 최소 뉴스 점수

  # ✅ 추가: 우선 감시 리스트 조건 (🔥 ChatGPT Fix: 조건 강화)
  priority_watchlist:
    min_eod_score: 0.65                  # 최소 EOD 점수 (0.55 → 0.65)
    min_close_to_high_ratio: 0.88        # 종가/고가 최소 88% (0.8 → 0.88)
    min_vol_z20: 1.2                     # 최소 거래량 Z-score (1.0 → 1.2)
    min_news_score: 50                   # 최소 뉴스 점수 (45 → 50, 중립 이상)

# ========================================
# ✅ ChatGPT 리뷰 반영: 갭업 재진입 설정
# ========================================
gap_reentry:
  enabled: true
  gap_threshold_pct: 3.0                 # 갭업 기준 (%)
  volume_z_threshold: 2.0                # 거래량 Z-score 기준
  check_window_minutes: 30               # 체크 시간 (장 시작 후 30분)
  reentry_confidence: 0.7                # 재진입 신뢰도
  first_candle_window: 5                 # ✅ 수정: 3-5분봉 기준 (1분봉에서 완화)

logging:
  enabled: true
  log_dir: "logs"
  log_level: "INFO"

test:
  stock_symbols:
    - "005930"
    - "015760"
  data_days: 7
  interval: "5m"

# ========================================
# Bottom Pullback 전략 설정 (조건 23번)
# ========================================
condition_strategies:
  # 기존 모멘텀 전략 (17-22번)
  momentum:
    condition_indices: [17, 18, 19, 20, 21, 22]
    strategy_tag: "momentum"
    immediate_entry: true
    description: "기존 즉시 매수 전략 (VWAP + L0-L6 필터)"

  # Bottom Pullback 전략 (23번)
  bottom_pullback:
    condition_indices: [23]
    strategy_tag: "bottom_pullback"
    immediate_entry: false
    wait_for_pullback: true
    max_entries_per_day: 1
    description: "조건 신호 → VWAP Pullback 대기 → 재돌파 시 진입"

    # Pullback 조건 정의
    pullback:
      type: "vwap_reclaim"
      allow_below_vwap: true                    # VWAP 이탈 허용
      invalidate_if_break_signal_low: true      # 신호봉 저가 이탈 시 무효화

      # ✅ VWAP 이탈 조건 (정량화)
      break_conditions:
        vwap_break_threshold_pct: -0.3          # VWAP 대비 -0.3% 이상 이탈 시 감지
                                                # (작은 노이즈 무시, 의미있는 이탈만 인정)

      # ✅ VWAP 재돌파 조건 (정량화)
      reclaim_conditions:
        vwap_reclaim_threshold_pct: 0.2         # VWAP 대비 +0.2% 이상 돌파 시 감지
                                                # (확실한 재돌파만 인정)
        min_volume_ratio: 1.0                   # 돌파 봉 거래량 ≥ 직전 5봉 평균
        confirm_candles: 1                       # 재돌파 후 확인 봉 수

      # 무효화 조건
      invalidation:
        break_signal_low_pct: -0.5              # 신호봉 저가 -0.5% 이탈 시 무효
        max_wait_minutes: 180                   # 기본 최대 대기 시간 3시간

        # ✅ 동적 시간 제한 (변동성 기반)
        use_dynamic_timeout: true               # 동적 시간 제한 활성화
        high_volatility_minutes: 120            # 고변동성: 2시간
        low_volatility_minutes: 240             # 저변동성: 4시간
        volatility_threshold_high: 3.0          # 고변동성 기준: ATR% >= 3.0
        volatility_threshold_low: 1.5           # 저변동성 기준: ATR% <= 1.5

      # 시간 제한
      time_window:
        start: "09:30"                          # 진입 가능 시작 시간
        end: "14:30"                            # 진입 가능 종료 시간

# ========================================
# SMC (Smart Money Concepts) 전략 설정
# ========================================
smc:
  enabled: true                        # SMC 전략 활성화

  # 스윙 포인트 설정
  swing_lookback: 5                    # 스윙 탐지 좌우 비교 봉 수
  min_swing_size_pct: 0.3              # 최소 스윙 크기 (%) - 노이즈 제거

  # 유동성 스윕 설정
  sweep_threshold_pct: 0.1             # 스윕 인정 최소 돌파율 (%)
  sweep_lookback: 20                   # 유동성 스윕 탐색 범위

  # 진입 조건
  require_liquidity_sweep: true        # 🔧 2026-01-23: Sweep 필수 (CHoCH 단독 진입 차단)
  long_only: true                      # 롱만 진입 (숏 신호 무시)

  # 오더블록 설정
  ob_lookback: 10                      # 오더블록 탐색 범위

  # 타임프레임
  analysis_timeframe: "5min"           # SMC 분석 타임프레임

  # 🔧 2026-01-23: CHoCH 등급 필터 (과진입 방지)
  choch_grade:
    enabled: true                      # 등급 필터 활성화
    min_grade: "B"                     # 최소 허용 등급 (A/B/C) - C급 차단
    grade_b_weight: 0.5                # B급 CHoCH 비중 배율 (50%)
    # A급: HTF 구조 일치 + Sweep + OB 명확 + Squeeze 수축 (70점+)
    # B급: 일부 조건 미충족 (40-69점)
    # C급: 횡보 내 CHoCH, 저품질 (40점 미만) → 진입 금지

  # 🔧 2026-01-23: 추가 진입 필터 (옵션)
  additional_filters:
    require_squeeze_on: false          # Squeeze ON 상태 필수 (에너지 축적 확인)
    require_vwap_above: false          # VWAP 위 필수 (추세 확인)

  # 🔧 2026-01-29: MTF Bias 필터 (30분봉 추세 체크)
  # LONG 진입 시 30분봉이 하락 추세면 진입 차단
  # → 추세에 역행하는 "방향 싸움" 거래 방지 (DRAW 발생 핵심 원인)
  mtf_bias:
    enabled: true                      # MTF Bias 필터 활성화
    timeframe: "30min"                 # 상위 타임프레임 (30분봉)
    # 하락 추세 정의: Lower High + Lower Low 패턴
    # 상승 추세 정의: Higher High + Higher Low 패턴
    # 중립: 패턴 불명확 → LONG 허용

  # 🔧 2026-02-06: SMC 진입 프리필터 (진입 품질 개선)
  # CHoCH 감지 후 3가지 조건 중 min_conditions 이상 충족 시만 진입
  # 목표: 승률 16.7% → 30~35%, 진입 수 50% 감소
  entry_prefilter:
    enabled: true                      # 프리필터 활성화
    min_conditions: 2                  # 최소 충족 조건 수 (3개 중 2개)
    require_htf_trend: true            # 조건1: HTF 추세 생존 체크
    require_liquidity_sweep: true      # 조건2: 유동성 청산 확인
    require_reclaim: true              # 조건3: 되돌림 캔들 확인
    reclaim_lookback: 5                # CHoCH 후 몇 캔들 내 되돌림 확인
    reclaim_tolerance_pct: 0.3         # broken level 대비 허용 범위 (%)
